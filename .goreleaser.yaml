version: 2

project_name: kube-insight

before:
  hooks:
    - go mod download

builds:
  - id: kube-insight
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - embedwebui
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
  - id: kube-insight-chdb-linux-amd64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - linux
    goarch:
      - amd64
  - id: kube-insight-chdb-linux-arm64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - linux
    goarch:
      - arm64
  - id: kube-insight-chdb-darwin-amd64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - darwin
    goarch:
      - amd64
  - id: kube-insight-chdb-darwin-arm64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - id: kube-insight
    ids:
      - kube-insight
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: kube-insight-chdb-linux-amd64
    ids:
      - kube-insight-chdb-linux-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/linux-amd64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
  - id: kube-insight-chdb-linux-arm64
    ids:
      - kube-insight-chdb-linux-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/linux-arm64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
  - id: kube-insight-chdb-darwin-amd64
    ids:
      - kube-insight-chdb-darwin-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/darwin-amd64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
  - id: kube-insight-chdb-darwin-arm64
    ids:
      - kube-insight-chdb-darwin-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/darwin-arm64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers_v2:
  - id: kube-insight
    ids:
      - kube-insight
    dockerfile: Dockerfile
    images:
      - ghcr.io/nowakeai/kube-insight
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.source: https://github.com/nowakeai/kube-insight
      org.opencontainers.image.description: Kubernetes investigation data collector and API
  - id: kube-insight-chdb
    ids:
      - kube-insight-chdb-linux-amd64
      - kube-insight-chdb-linux-arm64
    dockerfile: docker/chdb.Dockerfile
    images:
      - ghcr.io/nowakeai/kube-insight
    tags:
      - "{{ .Tag }}-chdb"
      - latest-chdb
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - build/chdb-runtime/libchdb-linux-amd64.so
      - build/chdb-runtime/libchdb-linux-arm64.so
    labels:
      org.opencontainers.image.source: https://github.com/nowakeai/kube-insight
      org.opencontainers.image.description: Kubernetes investigation data collector and API with bundled chDB runtime
