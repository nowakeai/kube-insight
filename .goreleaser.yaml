version: 2

project_name: kube-insight

# Keep the release workflow and local `make release-chdb-check` aligned with
# this file. The workflow prepares chDB runtime files before GoReleaser runs.
before:
  hooks:
    - go mod download

builds:
  # Default standalone binaries stay small and pure-Go. They include the embedded
  # Web UI but do not link chDB; SQLite remains the local/test fallback and
  # ClickHouse can still be used through its HTTP driver.
  - id: kube-insight
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - embedwebui
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
  # chDB-enabled standalone binaries are separate artifacts because they need
  # the matching libchdb runtime file in the release archive. Split per
  # OS/arch so each archive can include the correct runtime asset.
  - id: kube-insight-chdb-linux-amd64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - linux
    goarch:
      - amd64
  - id: kube-insight-chdb-linux-arm64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - linux
    goarch:
      - arm64
  - id: kube-insight-chdb-darwin-amd64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - darwin
    goarch:
      - amd64
  - id: kube-insight-chdb-darwin-arm64
    main: ./cmd/kube-insight
    binary: kube-insight
    env:
      - CGO_ENABLED=0
    tags:
      - chdb
      - embedwebui
    goos:
      - darwin
    goarch:
      - arm64

archives:
  # Default archives contain only the kube-insight binary. Windows uses zip so
  # the artifact matches platform convention; the other platforms use the
  # GoReleaser default archive format.
  - id: kube-insight
    ids:
      - kube-insight
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
  # chDB archives include both the binary and the per-platform libchdb runtime.
  # The example config documents how to run the artifact with the embedded
  # ClickHouse-compatible storage engine.
  - id: kube-insight-chdb-linux-amd64
    ids:
      - kube-insight-chdb-linux-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/linux-amd64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
  - id: kube-insight-chdb-linux-arm64
    ids:
      - kube-insight-chdb-linux-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/linux-arm64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
  - id: kube-insight-chdb-darwin-amd64
    ids:
      - kube-insight-chdb-darwin-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/darwin-amd64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml
  - id: kube-insight-chdb-darwin-arm64
    ids:
      - kube-insight-chdb-darwin-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_chdb_{{ .Os }}_{{ .Arch }}"
    files:
      - src: build/chdb-runtime/darwin-arm64/libchdb.so
        dst: libchdb.so
      - src: config/kube-insight.chdb.example.yaml
        dst: config/kube-insight.chdb.example.yaml

# Publish one checksum file covering all GitHub Release archives.
checksum:
  name_template: checksums.txt

# Local snapshot builds get a clear non-release version. Tag releases keep the
# tag-derived semantic version.
snapshot:
  version_template: "{{ incpatch .Version }}-next"

# GitHub Release notes come from the release workflow. This changelog filter is
# still useful for local/snapshot GoReleaser runs and keeps docs/test-only
# commits out of generated changelog sections.
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers_v2:
  # The container image is chDB-capable by default. It uses the Linux chDB builds
  # as inputs, then docker/chdb.Dockerfile copies the correct libchdb runtime
  # for each target platform into the image.
  - id: kube-insight
    ids:
      - kube-insight-chdb-linux-amd64
      - kube-insight-chdb-linux-arm64
    dockerfile: docker/chdb.Dockerfile
    images:
      - ghcr.io/nowakeai/kube-insight
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - build/chdb-runtime/libchdb-linux-amd64.so
      - build/chdb-runtime/libchdb-linux-arm64.so
    labels:
      org.opencontainers.image.source: https://github.com/nowakeai/kube-insight
      org.opencontainers.image.description: Kubernetes investigation data collector and API with bundled chDB runtime
