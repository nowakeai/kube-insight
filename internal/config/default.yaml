version: v1alpha1

instance:
  # all: local single process; writer: discovery/watch/ingest only;
  # api: read/query/API/Web/MCP only, no watch writers.
  role: all

logging:
  level: info
  format: text

storage:
  driver: sqlite
  sqlite:
    path: kubeinsight.db
  maintenance:
    # Lightweight maintenance runs with watch/serve --watch. It checkpoints WAL
    # and runs incremental vacuum; full db compact remains an explicit command.
    enabled: true
    intervalSeconds: 300
    minWalBytes: 16777216
    incrementalVacuumPages: 256
    journalSizeLimitBytes: 67108864
    runOnStart: false
    skipWhenDatabaseBusy: true
    logUnchangedMaintenanceRuns: false
  retention:
    # Disabled by default because full historical proof is a core product mode.
    # Enable when the deployment wants bounded local storage. Retention always
    # keeps each object's latest version and at least minVersionsPerObject.
    enabled: false
    maxAgeSeconds: 0
    minVersionsPerObject: 1
    # Optional independent TTL for auditable filter decisions.
    filterDecisionMaxAgeSeconds: 0
    # Named retention policies. Resource profiles select these by name.
    policies:
      standard:
        minVersionsPerObject: 1
      events_short_window:
        maxAgeSeconds: 604800
        minVersionsPerObject: 1
      crd_long_window:
        maxAgeSeconds: 7776000
        minVersionsPerObject: 2
      derived_short_window:
        maxAgeSeconds: 604800
        minVersionsPerObject: 1
  postgres:
    dsnEnv: KUBE_INSIGHT_POSTGRES_DSN
  cockroach:
    dsnEnv: KUBE_INSIGHT_COCKROACH_DSN

collection:
  enabled: true
  kubeconfig: ""
  useClientGo: true
  contexts: []
  allContexts: false
  namespace: ""
  concurrency: 4
  watch:
    # Keep HTTP/2 enabled by default. Some Kubernetes front doors require it;
    # disabling it can produce malformed HTTP/2 frame bytes on HTTP/1.x clients.
    # Use this only for clusters/proxies proven to behave better with HTTP/1.1.
    disableHttp2: false
    # Limit long-lived WATCH streams. All resources still get an initial LIST;
    # lower-priority streams wait instead of overloading the API front door.
    maxConcurrentStreams: 64
    minBackoffMillis: 500
    maxBackoffMillis: 30000
    streamStartStaggerMillis: 200
  resources:
    all: true
    include: []
    exclude:
      # Prefer events.events.k8s.io as the canonical Event source. Core v1
      # events often duplicates the same evidence and wastes storage.
      - events
      - leases.coordination.k8s.io
      # Derived policy/report resources are high-churn and low-value for the
      # default PoC evidence path. Include them explicitly when investigating
      # policy engines.
      - "*policyreports.wgpolicyk8s.io"
      - "*ephemeralreports.reports.kyverno.io"

resourceProfiles:
  # Resource profiles are the single resource classification point. They map
  # resources to named filter chains, extractor sets, retention policies, and
  # storage/priority hints.
  defaults:
    enabled: true
    retentionPolicy: standard
    filterChain: default
    extractorSet: generic
    compactionStrategy: full_json
    priority: normal
    maxEventBuffer: 256
  # Built-in rules cover common high-value resources. Custom rules are matched
  # before built-ins, so they can override priority, extractor/filter selection,
  # retention policy, and enabled state for specific resources.
  replaceDefaults: false
  rules: []

processing:
  # Filter chains run before retained JSON hashing. That means normalized fields
  # do not create new historical versions, but their Kubernetes resourceVersion
  # is still retained in observation/version metadata.
  filterChains:
    default:
      - managed_fields
      - resource_version
      - metadata_generation
      - status_condition_set
      - leader_election_configmap
      - cluster_autoscaler_status
      - gke_webhook_heartbeat
    event_rollup:
      - managed_fields
      - resource_version
      - event_series
    secret_metadata_only:
      - managed_fields
      - resource_version
      - secret_metadata_only
    lease_skip:
      - lease_skip
    report_skip:
      - report_skip
    none: []
  filters:
    lease_skip:
      type: builtin
      enabled: true
      action: discard_resource
      guard:
        resources: [leases.coordination.k8s.io]
    report_skip:
      type: builtin
      enabled: true
      action: discard_resource
    secret_metadata_only:
      type: builtin
      enabled: true
      action: keep_modified
      guard:
        resources: [secrets]
      removePaths:
        - /data
        - /stringData
      keepSecretKeys: true
    managed_fields:
      type: builtin
      enabled: true
      action: keep_modified
      removePaths:
        - /metadata/managedFields
    resource_version:
      type: builtin
      enabled: true
      action: keep_modified
      removePaths:
        - /metadata/resourceVersion
    metadata_generation:
      type: builtin
      enabled: true
      action: keep_modified
      removePaths:
        # generation is derived from spec updates. The actual spec/status change
        # remains in retained JSON, so generation-only churn should not create a
        # retained version.
        - /metadata/generation
    status_condition_timestamps:
      type: builtin
      enabled: true
      action: keep_modified
      removePaths:
        # Preserve condition type/status/reason/message, but remove
        # heartbeat-only timestamp churn from the document hash.
        - /status/conditions/*/lastHeartbeatTime
        - /status/conditions/*/lastTransitionTime
        - /status/conditions/*/lastUpdateTime
    status_condition_set:
      type: builtin
      enabled: true
      action: keep_modified
    leader_election_configmap:
      type: builtin
      enabled: true
      action: keep_modified
      guard:
        resources: [configmaps]
      removePaths:
        # Legacy leader-election ConfigMaps behave like Leases and are noisy.
        - /metadata/annotations/control-plane.alpha.kubernetes.io~1leader
    cluster_autoscaler_status:
      type: builtin
      enabled: true
      action: keep_modified
      guard:
        resources: [configmaps]
        namespaces: [kube-system]
        names: [cluster-autoscaler-status]
    gke_webhook_heartbeat:
      type: builtin
      enabled: true
      action: keep_modified
      guard:
        resources: [configmaps]
        namespaces: [kube-system]
        names: [gke-common-webhook-heartbeat]
    event_series:
      type: builtin
      enabled: true
      action: keep_modified
      guard:
        resources: [events.events.k8s.io]
      removePaths:
        # Event series/count fields change on repeated occurrences of the same
        # event. Keep the event proof and observation/resourceVersion history,
        # but avoid retaining a full new document for count-only churn.
        - /deprecatedCount
        - /deprecatedLastTimestamp
        - /series
        - /series/count
        - /series/lastObservedTime
        - /eventTime
  extractorSets:
    generic: [reference]
    pod: [reference, pod]
    node: [reference, node]
    event: [reference, event]
    endpointslice: [reference, endpointslice]
    secret_metadata: [reference]
    workload: [reference]
    service_topology: [reference]
    webhook: [reference]
    rbac: [reference]
    certmanager: [reference]
    crd: [reference]
    none: []
  extractors:
    reference:
      type: builtin
      enabled: true
    pod:
      type: builtin
      enabled: true
      guard:
        resources: [pods]
    node:
      type: builtin
      enabled: true
      guard:
        resources: [nodes]
    event:
      type: builtin
      enabled: true
      guard:
        resources: [events.events.k8s.io]
    endpointslice:
      type: builtin
      enabled: true
      guard:
        resources: [endpointslices.discovery.k8s.io]

plugins:
  goja:
    enabled: false
    directories:
      - ./plugins

server:
  api:
    enabled: false
    listen: 127.0.0.1:8080
  metrics:
    enabled: false
    listen: 127.0.0.1:9090
  web:
    enabled: false
    listen: 127.0.0.1:8081
  chat:
    enabled: false
    openaiApiKeyEnv: OPENAI_API_KEY
    model: gpt-5.2

mcp:
  enabled: false
  listen: 127.0.0.1:8090

validation:
  maxStoredToRawRatio: 20
  maxLatestLookupP95Ms: 250
  maxHistoricalGetP95Ms: 250
  maxServiceInvestigationP95Ms: 5000
  minServiceVersions: 3
  minServiceDiffs: 1
