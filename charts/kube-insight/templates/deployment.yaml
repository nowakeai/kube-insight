apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-insight.fullname" . }}
  labels:
    {{- include "kube-insight.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.updateStrategy }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  {{- else if or (eq .Values.storage.driver "sqlite") (eq .Values.storage.driver "chdb") }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "kube-insight.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-insight.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kube-insight.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kube-insight
          image: {{ include "kube-insight.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- include "kube-insight.commandArgs" . | nindent 12 }}
          ports:
            {{- if ne .Values.mode "writer" }}
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: TMPDIR
              value: /tmp
            {{- if eq .Values.storage.driver "clickhouse" }}
            - name: KUBE_INSIGHT_CLICKHOUSE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-clickhouse" (include "kube-insight.fullname" .)) .Values.storage.clickhouse.existingSecret }}
                  key: {{ .Values.storage.clickhouse.existingSecretKey }}
            {{- end }}
            {{- if and .Values.server.chat.enabled .Values.server.chat.existingSecret }}
            - name: {{ .Values.server.chat.apiKeyEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.chat.existingSecret }}
                  key: {{ .Values.server.chat.apiKeySecretKey }}
            {{- if .Values.server.chat.baseUrlEnv }}
            - name: {{ .Values.server.chat.baseUrlEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.chat.existingSecret }}
                  key: {{ .Values.server.chat.baseUrlSecretKey }}
                  optional: true
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if ne .Values.mode "writer" }}
          readinessProbe:
            httpGet:
              path: /api/v1/server/info
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/server/info
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/kube-insight
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if or (eq .Values.storage.driver "sqlite") (eq .Values.storage.driver "chdb") }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kube-insight.fullname" . }}
        - name: tmp
          emptyDir: {}
        {{- if or (eq .Values.storage.driver "sqlite") (eq .Values.storage.driver "chdb") }}
        - name: data
          {{- if or (and (eq .Values.storage.driver "sqlite") .Values.storage.sqlite.persistence.enabled) (and (eq .Values.storage.driver "chdb") .Values.storage.chdb.persistence.enabled) }}
          persistentVolumeClaim:
            claimName: {{ include "kube-insight.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
