name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  # chDB runtime assets come from chdb-core, which publishes libchdb tarballs.
  CHDB_VERSION: "26.5.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded web assets
        run: make web-build

      - name: Prepare release notes
        run: mkdir -p dist

      - name: Build changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          outputFile: RELEASE_NOTES.md
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "empty_template": "No user-facing changes were detected by the changelog builder.",
              "commit_template": "- #{{TITLE}} (#{{MERGE_SHA}})",
              "categories": [
                {
                  "title": "## Features",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## Performance",
                  "labels": ["perf", "performance"]
                },
                {
                  "title": "## Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## Documentation",
                  "labels": ["docs", "documentation"]
                },
                {
                  "title": "## CI and Maintenance",
                  "labels": ["build", "chore", "ci", "refactor", "test"]
                },
                {
                  "title": "## Other Changes",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?: .+",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append release artifact notes
        run: |
          {
            echo
            echo "## Artifacts"
            echo
            printf -- '- Default archives: Linux, macOS, and Windows amd64; Linux and macOS arm64.\n'
            printf -- '- chDB archives: Linux and macOS amd64/arm64, each bundled with the matching `libchdb.so` runtime.\n'
            printf -- '- Embedded Web UI: release binaries include the prebuilt React app; run `kube-insight serve --app` and open the app listener.\n'
            printf -- '- Container image: `ghcr.io/%s:%s`, bundled with the matching Linux `libchdb.so` runtime.\n' "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}"
            printf -- '- Convenience tag: `ghcr.io/%s:latest`.\n' "${GITHUB_REPOSITORY}"
          } >> RELEASE_NOTES.md

      - name: Prepare chDB runtime
        run: make prepare-chdb-runtime

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
